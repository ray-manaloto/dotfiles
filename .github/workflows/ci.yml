name: CI

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly Sunday midnight
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - 'docker-bake.hcl'
      - 'home/**'
      - 'python/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
      - 'hk.pkl'
      - 'renovate.json'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Bake target (dev, cpp, all)'
        required: false
        default: 'dev'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-devcontainer

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Build Type 1: Project linting (hk + mise)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Validate hk config
        run: hk validate
        env:
          HK_PKL_BACKEND: pklr
          HK_LOG: debug

      - name: Run hk checks
        run: hk check --all
        env:
          HK_PKL_BACKEND: pklr

      - name: Check for outdated tools
        run: mise outdated || true

  contract-preflight:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Dockerfile contracts
        run: |
          set -euo pipefail
          echo "--- Checking Dockerfile syntax directive ---"
          head -1 .devcontainer/Dockerfile | grep -q 'syntax=docker/dockerfile' || \
            { echo "FAIL: Missing BuildKit syntax directive"; exit 1; }

          echo "--- Checking APT snapshot pinning ---"
          grep -q 'APT_SNAPSHOT' .devcontainer/Dockerfile || \
            { echo "FAIL: Missing APT_SNAPSHOT build arg"; exit 1; }

          echo "--- Checking BASE_IMAGE composability ---"
          grep -q 'ARG BASE_IMAGE' .devcontainer/Dockerfile || \
            { echo "FAIL: Missing BASE_IMAGE build arg"; exit 1; }

          echo "--- Checking install.sh entry point ---"
          grep -q 'install.sh' .devcontainer/Dockerfile || \
            { echo "FAIL: Dockerfile must use install.sh as entry point"; exit 1; }

          echo "--- Checking docker-bake.hcl exists ---"
          test -f docker-bake.hcl || \
            { echo "FAIL: Missing docker-bake.hcl"; exit 1; }

          echo "--- Checking SBOM attestation ---"
          grep -q 'type=sbom' docker-bake.hcl || \
            { echo "FAIL: Missing SBOM attestation in bake config"; exit 1; }

          echo "All contracts passed."

  # ============================================================
  # Build Type 2: Dotfiles environment image (Docker → ghcr.io)
  # ============================================================
  build:
    needs: contract-preflight
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=sha,prefix=
            type=ref,event=pr

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          targets: ${{ github.event.inputs.target || 'dev' }}
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            dev.tags=${{ steps.meta.outputs.tags }}
            dev.labels=${{ steps.meta.outputs.labels }}

  # ============================================================
  # Smoke test: validate the published image
  # ============================================================
  smoke-test:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Pull published image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev

      - name: Validate tools installed
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev bash -lc '
            set -euo pipefail
            echo "=== hk validate ==="
            cd ~/.local/share/chezmoi && hk validate
            echo "=== mise ls (check no missing) ==="
            missing=$(mise ls 2>&1 | grep -c "(missing)" || true)
            echo "Missing tools: $missing"
            if [ "$missing" -gt 0 ]; then
              mise ls 2>&1 | grep "(missing)"
              exit 1
            fi
            echo "=== All checks passed ==="
          '
