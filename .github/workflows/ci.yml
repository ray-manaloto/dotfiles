name: CI

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-devcontainer

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          # Only push on main, schedule, or PR (PRs get a unique tag)
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  validate-setup:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    # Use the image built in the previous step via the local Docker cache/context
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run validation in local image
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          export DOTFILES_IMAGE="ghcr.io/${{ github.repository }}-devcontainer:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}"
          cd python
          uv run dotfiles-setup docker up
          uv run dotfiles-setup docker test
          uv run dotfiles-setup docker down
